<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PolicyCapture - Frame Review</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ---- Top bar ---- */
    .topbar {
      flex-shrink: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: rgba(10, 10, 15, 0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .brand { font-size: 15px; font-weight: 600; color: #e2e8f0; text-decoration: none; }
    .brand .accent { color: #60a5fa; }
    .topbar-sep { color: #334155; font-size: 13px; }
    .topbar-link { color: #64748b; text-decoration: none; font-size: 13px; transition: color 0.15s; }
    .topbar-link:hover { color: #e2e8f0; }
    .topbar-title { font-size: 13px; color: #94a3b8; }
    .topbar-right { display: flex; align-items: center; gap: 8px; }

    .stat { font-size: 11px; color: #64748b; padding: 4px 10px; border-radius: 6px; background: rgba(255,255,255,0.04); }
    .stat b { color: #e2e8f0; font-weight: 600; }

    .btn {
      padding: 7px 14px; border: none; border-radius: 8px;
      font-size: 12px; font-weight: 500; cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-blue { background: #2563eb; color: #fff; }
    .btn-blue:hover { background: #1d4ed8; }
    .btn-ghost { background: transparent; color: #60a5fa; }
    .btn-ghost:hover { background: rgba(96,165,250,0.1); }

    /* ---- Main layout ---- */
    .main-area { flex: 1; display: flex; overflow: hidden; min-height: 0; }

    /* ---- Side panel: selected frames ---- */
    .side-panel {
      width: 260px; flex-shrink: 0;
      background: #0d0d14;
      border-right: 1px solid rgba(255,255,255,0.06);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .side-header {
      padding: 10px 14px;
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.6px; color: #64748b;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      display: flex; align-items: center; justify-content: space-between;
    }
    .side-header .count { color: #22c55e; font-weight: 600; }

    .side-tabs { display: flex; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .side-tab {
      flex: 1; padding: 8px; text-align: center;
      font-size: 10px; font-weight: 600; color: #64748b;
      cursor: pointer; border: none; background: none;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .side-tab:hover { color: #e2e8f0; }
    .side-tab.active { color: #22c55e; border-bottom-color: #22c55e; }
    .side-tab.active.manual-tab { color: #60a5fa; border-bottom-color: #60a5fa; }

    /* Bulk actions */
    .bulk-actions {
      display: flex; gap: 6px; padding: 8px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .bulk-btn {
      flex: 1; padding: 5px 0; border: none; border-radius: 6px;
      font-size: 10px; font-weight: 600; cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    .bulk-btn:disabled { opacity: 0.4; cursor: default; }
    .select-all-btn {
      background: rgba(34,197,94,0.12); color: #22c55e;
    }
    .select-all-btn:hover:not(:disabled) { background: rgba(34,197,94,0.22); }
    .unselect-all-btn {
      background: rgba(239,68,68,0.10); color: #ef4444;
    }
    .unselect-all-btn:hover:not(:disabled) { background: rgba(239,68,68,0.20); }

    /* Score threshold */
    .score-threshold {
      padding: 8px 14px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .score-threshold-row {
      display: flex; align-items: center; gap: 8px;
    }
    .score-threshold-label {
      font-size: 10px; color: #64748b; white-space: nowrap;
    }
    .score-threshold-value {
      font-size: 10px; font-weight: 700; color: #94a3b8;
      min-width: 32px; text-align: right; font-variant-numeric: tabular-nums;
    }
    #score-slider {
      flex: 1; accent-color: #22c55e; cursor: pointer;
      height: 20px;
    }
    .score-threshold-info {
      font-size: 9px; color: #475569; margin-top: 4px;
    }

    .side-list { flex: 1; overflow-y: auto; padding: 6px; }
    .side-list::-webkit-scrollbar { width: 4px; }
    .side-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .side-card {
      display: flex; gap: 8px; padding: 6px;
      border-radius: 8px; cursor: pointer; transition: background 0.15s;
      margin-bottom: 2px; border: 1px solid transparent;
    }
    .side-card:hover { background: rgba(255,255,255,0.04); }
    .side-card.active { background: rgba(96,165,250,0.1); border-color: rgba(96,165,250,0.3); }

    .side-card img {
      width: 80px; height: 45px; object-fit: cover;
      border-radius: 4px; background: #1a1a24; flex-shrink: 0;
    }
    .side-card-info { display: flex; flex-direction: column; justify-content: center; gap: 2px; min-width: 0; }
    .side-card-time { font-size: 12px; font-weight: 600; font-variant-numeric: tabular-nums; color: #e2e8f0; }
    .side-card-score { font-size: 10px; color: #64748b; }
    .side-card-score b { color: #22c55e; }
    .side-card-type { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; color: #22c55e; }
    .side-card-type.manual { color: #60a5fa; }
    .side-card.unselected { opacity: 0.55; }
    .side-card.unselected:hover { opacity: 0.8; }

    .side-card-remove, .side-card-add {
      margin-left: auto; align-self: center;
      width: 20px; height: 20px; border-radius: 4px;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; opacity: 0; transition: opacity 0.15s;
    }
    .side-card:hover .side-card-remove,
    .side-card:hover .side-card-add { opacity: 1; }

    .side-card-remove { background: rgba(239,68,68,0.15); color: #f87171; }
    .side-card-remove:hover { background: rgba(239,68,68,0.3); }

    .side-card-add { background: rgba(34,197,94,0.15); color: #4ade80; font-weight: 700; }
    .side-card-add:hover { background: rgba(34,197,94,0.3); }

    /* ---- Preview area ---- */
    .preview-area {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 20px; min-width: 0; position: relative;
    }
    .preview-frame {
      max-width: 100%; max-height: 100%;
      border-radius: 8px; background: #111118;
      box-shadow: 0 4px 30px rgba(0,0,0,0.4); object-fit: contain;
    }
    .preview-info {
      position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 12px;
      padding: 8px 16px; background: rgba(15,15,22,0.9);
      backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px; font-size: 12px; color: #94a3b8;
    }
    .preview-info b { color: #e2e8f0; }
    .preview-info .sep { width: 1px; height: 14px; background: rgba(255,255,255,0.12); }
    .preview-toggle-btn {
      padding: 4px 12px; border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.15); background: transparent;
      color: #94a3b8; font-size: 11px; font-weight: 500;
      cursor: pointer; transition: all 0.15s;
    }
    .preview-toggle-btn:hover { border-color: rgba(255,255,255,0.3); color: #fff; }
    .preview-toggle-btn.active { background: #2563eb; border-color: #3b82f6; color: #fff; }
    .preview-select-btn {
      padding: 4px 12px; border-radius: 14px; border: none;
      font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.15s;
    }
    .preview-select-btn.select { background: #22c55e; color: #fff; }
    .preview-select-btn.select:hover { background: #16a34a; }
    .preview-select-btn.deselect { background: rgba(239,68,68,0.2); color: #f87171; }
    .preview-select-btn.deselect:hover { background: rgba(239,68,68,0.3); }
    .preview-empty { color: #475569; font-size: 14px; text-align: center; }

    /* ---- Timeline ---- */
    .timeline-area {
      flex-shrink: 0;
      border-top: 1px solid rgba(255,255,255,0.08);
      background: #0d0d14;
      display: flex; flex-direction: column;
    }

    .timeline-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .timeline-toolbar-left { display: flex; align-items: center; gap: 8px; }
    .timeline-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: #64748b; }

    .filter-chip {
      padding: 3px 10px; border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08); background: transparent;
      color: #64748b; font-size: 10px; cursor: pointer; transition: all 0.15s;
    }
    .filter-chip:hover { border-color: rgba(255,255,255,0.2); color: #e2e8f0; }
    .filter-chip.active { background: #1e40af; border-color: #3b82f6; color: #fff; }

    .timeline-hint {
      font-size: 10px; color: #475569;
    }

    /* Video progress bar (continuous timeline) */
    .video-timeline {
      position: relative;
      height: 40px;
      margin: 0 16px 4px;
      cursor: pointer;
      user-select: none;
    }

    .vt-bar {
      position: absolute;
      top: 14px; left: 0; right: 0; height: 12px;
      background: rgba(255,255,255,0.06);
      border-radius: 6px;
      overflow: hidden;
    }

    /* Playhead / scrubber */
    .vt-playhead {
      position: absolute;
      top: 8px;
      width: 3px; height: 24px;
      background: #fff;
      border-radius: 2px;
      z-index: 5;
      pointer-events: none;
      box-shadow: 0 0 8px rgba(255,255,255,0.4);
      transition: left 0.1s ease-out;
    }

    .vt-hover-time {
      display: none;
      position: absolute;
      top: -20px;
      transform: translateX(-50%);
      padding: 2px 8px;
      background: rgba(0,0,0,0.85);
      border-radius: 4px;
      font-size: 10px;
      font-variant-numeric: tabular-nums;
      color: #e2e8f0;
      white-space: nowrap;
      z-index: 10;
      pointer-events: none;
    }

    /* Frame markers on timeline */
    .vt-marker {
      position: absolute;
      top: 6px;
      width: 10px; height: 28px;
      transform: translateX(-50%);
      border-radius: 3px;
      z-index: 3;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.15s;
      opacity: 0.85;
    }
    .vt-marker:hover { transform: translateX(-50%) scaleY(1.15); opacity: 1; }
    .vt-marker.auto { background: #22c55e; }
    .vt-marker.manual { background: #3b82f6; }
    .vt-marker.scene { background: rgba(245,158,11,0.5); width: 4px; }
    .vt-marker.redundant { background: rgba(255,255,255,0.08); width: 3px; opacity: 0.4; }
    .vt-marker.active { box-shadow: 0 0 10px rgba(96,165,250,0.6); opacity: 1; }

    .vt-marker-tooltip {
      display: none;
      position: absolute;
      bottom: 32px; left: 50%; transform: translateX(-50%);
      padding: 3px 8px;
      background: rgba(0,0,0,0.9);
      border-radius: 4px;
      font-size: 9px;
      color: #e2e8f0;
      white-space: nowrap;
      z-index: 10;
    }
    .vt-marker:hover .vt-marker-tooltip { display: block; }

    /* Time ruler */
    .vt-ruler {
      position: absolute;
      bottom: 0; left: 0; right: 0; height: 12px;
    }
    .vt-tick {
      position: absolute;
      bottom: 0;
      font-size: 8px;
      color: #475569;
      font-variant-numeric: tabular-nums;
      transform: translateX(-50%);
    }
    .vt-tick::before {
      content: '';
      position: absolute;
      top: -4px; left: 50%;
      width: 1px; height: 4px;
      background: rgba(255,255,255,0.1);
    }

    /* Extract-at button */
    .extract-at-btn {
      padding: 4px 12px;
      border-radius: 14px;
      border: 1px solid rgba(59,130,246,0.4);
      background: rgba(59,130,246,0.1);
      color: #60a5fa;
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .extract-at-btn:hover { background: rgba(59,130,246,0.2); }
    .extract-at-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* Frame thumbnail strip */
    .timeline-scroll {
      overflow-x: auto; overflow-y: hidden;
      padding: 4px 16px 8px;
    }
    .timeline-scroll::-webkit-scrollbar { height: 5px; }
    .timeline-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

    .timeline-strip { display: flex; gap: 2px; min-width: min-content; }

    .tl-frame {
      width: 64px; flex-shrink: 0; cursor: pointer;
      position: relative; border-radius: 3px; overflow: hidden;
      border: 2px solid transparent; transition: border-color 0.15s, transform 0.1s;
    }
    .tl-frame:hover { transform: translateY(-1px); border-color: rgba(255,255,255,0.2); }
    .tl-frame.active { border-color: #60a5fa; }
    .tl-frame.selected { border-color: #22c55e; }
    .tl-frame.selected.manual-sel { border-color: #3b82f6; }
    .tl-frame.redundant { opacity: 0.3; }

    .tl-frame img { width: 100%; height: 36px; object-fit: cover; display: block; background: #1a1a24; }

    .tl-marker-dot {
      position: absolute; top: 1px; left: 50%; transform: translateX(-50%);
      width: 6px; height: 6px; border-radius: 50%;
      border: 1px solid #0d0d14; z-index: 2;
    }
    .tl-marker-dot.auto { background: #22c55e; }
    .tl-marker-dot.manual-dot { background: #3b82f6; }
    .tl-marker-dot.scene { background: #f59e0b; }

    /* ---- Lightbox ---- */
    .lightbox {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.92);
      align-items: center; justify-content: center; padding: 40px;
    }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 85vh; border-radius: 8px; box-shadow: 0 0 60px rgba(0,0,0,0.5); }
    .lightbox-close {
      position: absolute; top: 16px; right: 16px;
      width: 36px; height: 36px; border-radius: 50%; border: none;
      background: rgba(255,255,255,0.1); color: #fff; font-size: 18px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .lightbox-close:hover { background: rgba(255,255,255,0.2); }
    .lightbox-toggle-btn {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      padding: 8px 18px; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px;
      background: rgba(30,30,40,0.9); color: #94a3b8;
      font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; z-index: 210;
    }
    .lightbox-toggle-btn:hover { background: rgba(50,50,65,0.95); color: #fff; }
    .lightbox-toggle-btn.active { background: #2563eb; border-color: #3b82f6; color: #fff; }
    .lightbox-ocr {
      position: absolute; right: 16px; top: 60px; bottom: 60px; width: 280px;
      padding: 12px; background: rgba(10,10,15,0.92);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 8px;
      color: #94a3b8; font-size: 11px; font-family: monospace;
      overflow-y: auto; white-space: pre-wrap; word-break: break-word; z-index: 210;
    }

    .empty-state { text-align: center; padding: 30px 20px; color: #475569; }
    .empty-state p { font-size: 13px; margin-bottom: 4px; }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-left">
      <a href="/" class="brand"><img src="/static/img/logo-light.svg" alt="" width="20" height="20" style="vertical-align:-4px;margin-right:5px">PolicyCapture</a>
      <span class="topbar-sep">/</span>
      <a href="/" class="topbar-link">Dashboard</a>
      <span class="topbar-sep">/</span>
      <span class="topbar-title" id="job-title">Frame Review</span>
    </div>
    <div class="topbar-right">
      <span class="stat" id="stat-total">Total: <b>-</b></span>
      <span class="stat" id="stat-selected">Selected: <b>-</b></span>
      <span class="stat" id="stat-redundant">Unique: <b>-</b></span>
      <button class="btn btn-ghost" id="btn-backfill" title="Recompute OCR confidence scores for all frames">Refresh Scores</button>
      <button class="btn btn-ghost" onclick="window.location='/recorder'">Record New</button>
      <button class="btn btn-blue" id="btn-done">Done</button>
    </div>
  </div>

  <div class="main-area">
    <!-- Left: selected frames panel -->
    <div class="side-panel">
      <div class="side-header">
        <span>Selected Frames</span>
        <span class="count" id="side-count">0</span>
      </div>
      <div class="side-tabs">
        <button class="side-tab active" data-tab="auto">Auto</button>
        <button class="side-tab manual-tab" data-tab="manual">Manual</button>
        <button class="side-tab" data-tab="all">All</button>
      </div>
      <div class="bulk-actions">
        <button class="bulk-btn select-all-btn" id="btn-select-all">Select All</button>
        <button class="bulk-btn unselect-all-btn" id="btn-unselect-all">Unselect All</button>
      </div>
      <div class="score-threshold" id="score-threshold">
        <div class="score-threshold-row">
          <span class="score-threshold-label">Min score</span>
          <input type="range" id="score-slider" min="0" max="100" value="0" step="1">
          <span class="score-threshold-value" id="score-slider-value">0.00</span>
        </div>
        <div class="score-threshold-info" id="score-threshold-info"></div>
      </div>
      <div class="side-list" id="side-list"></div>
    </div>

    <!-- Center: large frame preview -->
    <div class="preview-area" id="preview-area">
      <p class="preview-empty" id="preview-empty">Click a frame in the timeline to preview it</p>
      <img class="preview-frame" id="preview-img" src="" alt="" style="display:none">
      <div class="preview-info" id="preview-info" style="display:none">
        <span id="preview-time">00:00</span>
        <span class="sep"></span>
        <span>Score: <b id="preview-score">0.00</b></span>
        <span class="sep"></span>
        <button class="preview-toggle-btn" id="preview-bbox-toggle">Bounding Boxes</button>
        <span class="sep"></span>
        <button class="preview-select-btn select" id="preview-select-btn">Select</button>
      </div>
    </div>
  </div>

  <!-- Timeline at bottom -->
  <div class="timeline-area">
    <div class="timeline-toolbar">
      <div class="timeline-toolbar-left">
        <span class="timeline-label">Timeline</span>
        <button class="filter-chip active" data-filter="all">All</button>
        <button class="filter-chip" data-filter="unique">Unique Only</button>
        <button class="filter-chip" data-filter="selected">Selected</button>
        <button class="filter-chip" data-filter="scene">Scene Changes</button>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="timeline-hint">Click timeline to scrub &middot; Double-click to extract frame</span>
        <button class="extract-at-btn" id="extract-at-btn" disabled>+ Extract Frame Here</button>
      </div>
    </div>

    <!-- Continuous video timeline bar -->
    <div class="video-timeline" id="video-timeline">
      <div class="vt-bar"></div>
      <div class="vt-playhead" id="vt-playhead" style="left:0"></div>
      <div class="vt-hover-time" id="vt-hover-time">00:00</div>
      <div class="vt-ruler" id="vt-ruler"></div>
      <!-- markers injected by JS -->
    </div>

    <!-- Frame thumbnail strip -->
    <div class="timeline-scroll" id="timeline-scroll">
      <div class="timeline-strip" id="timeline-strip">
        <div class="empty-state"><p>Loading frames...</p></div>
      </div>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightbox-close">&times;</button>
    <button class="lightbox-toggle-btn" id="lightbox-annotated-toggle">Show Bounding Boxes</button>
    <img id="lightbox-img" src="" alt="Frame preview">
    <pre class="lightbox-ocr" id="lightbox-ocr" style="display:none"></pre>
  </div>

  <script src="/static/js/frame_review.js"></script>
</body>
</html>
