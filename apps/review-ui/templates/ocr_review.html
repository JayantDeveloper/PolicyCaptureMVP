<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PolicyCapture - OCR & Entity Review</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      background: #08080d;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ---- Top bar ---- */
    .topbar {
      flex-shrink: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 20px;
      background: rgba(8,8,13,0.95);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .brand { font-size: 15px; font-weight: 600; color: #e2e8f0; text-decoration: none; }
    .brand .accent { color: #60a5fa; }
    .topbar-sep { color: #334155; font-size: 13px; }
    .topbar-link { color: #64748b; text-decoration: none; font-size: 13px; transition: color 0.15s; }
    .topbar-link:hover { color: #e2e8f0; }
    .topbar-title { font-size: 13px; color: #94a3b8; }
    .topbar-right { display: flex; align-items: center; gap: 8px; }

    .btn {
      padding: 7px 14px; border: none; border-radius: 8px;
      font-size: 12px; font-weight: 500; cursor: pointer;
      transition: all 0.15s; display: inline-flex; align-items: center; gap: 5px;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-blue { background: #2563eb; color: #fff; }
    .btn-blue:hover:not(:disabled) { background: #1d4ed8; }
    .btn-green { background: #059669; color: #fff; }
    .btn-green:hover:not(:disabled) { background: #047857; }
    .btn-ghost { background: transparent; color: #60a5fa; }
    .btn-ghost:hover { background: rgba(96,165,250,0.1); }

    .stat { font-size: 11px; color: #64748b; padding: 4px 10px; border-radius: 6px; background: rgba(255,255,255,0.04); }
    .stat b { color: #e2e8f0; font-weight: 600; }

    /* ---- Search bar ---- */
    .search-bar {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 10px;
      padding: 8px 20px;
      background: rgba(12,12,18,0.9);
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .search-input-wrap { flex: 1; position: relative; }
    .search-input {
      width: 100%; padding: 8px 14px 8px 36px;
      border-radius: 10px; border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: #e2e8f0; font-size: 13px;
      outline: none; transition: all 0.2s;
    }
    .search-input:focus { border-color: #3b82f6; background: rgba(59,130,246,0.06); }
    .search-input::placeholder { color: #475569; }
    .search-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: #475569; pointer-events: none;
    }
    .search-results-count { font-size: 11px; color: #64748b; white-space: nowrap; }

    /* Entity filter chips */
    .entity-filters { display: flex; gap: 4px; flex-wrap: wrap; }
    .entity-chip {
      padding: 3px 10px; border-radius: 12px;
      border: 1px solid; font-size: 10px;
      font-weight: 600; cursor: pointer;
      transition: all 0.15s; text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .entity-chip:hover { filter: brightness(1.2); }
    .entity-chip.active { filter: brightness(1); }
    .entity-chip:not(.active) { opacity: 0.4; }

    /* Entity type colors */
    .ent-date { border-color: #f59e0b; color: #f59e0b; background: rgba(245,158,11,0.08); }
    .ent-currency { border-color: #22c55e; color: #22c55e; background: rgba(34,197,94,0.08); }
    .ent-email { border-color: #3b82f6; color: #3b82f6; background: rgba(59,130,246,0.08); }
    .ent-phone { border-color: #a78bfa; color: #a78bfa; background: rgba(167,139,250,0.08); }
    .ent-percentage { border-color: #14b8a6; color: #14b8a6; background: rgba(20,184,166,0.08); }
    .ent-person_name { border-color: #f472b6; color: #f472b6; background: rgba(244,114,182,0.08); }
    .ent-organization { border-color: #fb923c; color: #fb923c; background: rgba(251,146,60,0.08); }
    .ent-address { border-color: #818cf8; color: #818cf8; background: rgba(129,140,248,0.08); }
    .ent-policy_number { border-color: #e879f9; color: #e879f9; background: rgba(232,121,249,0.08); }
    .ent-case_number { border-color: #67e8f9; color: #67e8f9; background: rgba(103,232,249,0.08); }
    .ent-ssn { border-color: #ef4444; color: #ef4444; background: rgba(239,68,68,0.08); }
    .ent-time_value { border-color: #fbbf24; color: #fbbf24; background: rgba(251,191,36,0.08); }
    .ent-state { border-color: #a3e635; color: #a3e635; background: rgba(163,230,53,0.08); }
    .ent-zip_code { border-color: #86efac; color: #86efac; background: rgba(134,239,172,0.08); }
    .ent-claim_number { border-color: #7dd3fc; color: #7dd3fc; background: rgba(125,211,252,0.08); }
    .ent-group_number { border-color: #c084fc; color: #c084fc; background: rgba(192,132,252,0.08); }
    .ent-ein { border-color: #f87171; color: #f87171; background: rgba(248,113,113,0.08); }
    .ent-npi { border-color: #fb7185; color: #fb7185; background: rgba(251,113,133,0.08); }
    .ent-medical_code { border-color: #34d399; color: #34d399; background: rgba(52,211,153,0.08); }
    .ent-account_number { border-color: #fda4af; color: #fda4af; background: rgba(253,164,175,0.08); }
    .ent-url { border-color: #94a3b8; color: #94a3b8; background: rgba(148,163,184,0.08); }
    .ent-id_number { border-color: #d4d4d8; color: #d4d4d8; background: rgba(212,212,216,0.08); }

    /* ---- Main layout ---- */
    .main-area { flex: 1; display: flex; overflow: hidden; min-height: 0; }

    /* ---- Frame strip (left) ---- */
    .frame-strip {
      width: 240px; flex-shrink: 0;
      background: #0a0a10;
      border-right: 1px solid rgba(255,255,255,0.06);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .frame-strip-header {
      padding: 12px 14px; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.6px; color: #64748b;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      display: flex; align-items: center; justify-content: space-between;
    }
    .frame-strip-header .frame-count { color: #94a3b8; font-weight: 600; }
    .frame-strip-list { flex: 1; overflow-y: auto; padding: 6px; }
    .frame-strip-list::-webkit-scrollbar { width: 4px; }
    .frame-strip-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

    .fs-card {
      display: flex; gap: 10px; padding: 8px;
      border-radius: 10px; cursor: pointer;
      margin-bottom: 3px; border: 1px solid transparent;
      transition: all 0.15s; position: relative;
    }
    .fs-card:hover { background: rgba(255,255,255,0.03); }
    .fs-card.active { background: rgba(96,165,250,0.08); border-color: rgba(96,165,250,0.2); }
    .fs-card.no-text { opacity: 0.35; }
    .fs-card.no-text:hover { opacity: 0.6; }
    .fs-card.filtered-out { display: none; }

    .fs-card img {
      width: 72px; height: 40px; object-fit: cover;
      border-radius: 5px; background: #1a1a24; flex-shrink: 0;
    }
    .fs-card-info { display: flex; flex-direction: column; justify-content: center; gap: 2px; min-width: 0; }
    .fs-card-time { font-size: 12px; font-weight: 600; color: #e2e8f0; font-variant-numeric: tabular-nums; }
    .fs-card-meta { font-size: 10px; color: #64748b; }
    .fs-card-entities { display: flex; gap: 2px; flex-wrap: wrap; margin-top: 2px; }
    .fs-entity-dot { width: 6px; height: 6px; border-radius: 50%; }

    /* Confidence badge */
    .conf-badge {
      font-size: 9px; font-weight: 700; padding: 1px 5px;
      border-radius: 4px; margin-left: auto; flex-shrink: 0;
      align-self: center;
    }
    .conf-high { background: rgba(34,197,94,0.15); color: #4ade80; }
    .conf-med { background: rgba(245,158,11,0.15); color: #fbbf24; }
    .conf-low { background: rgba(239,68,68,0.15); color: #fca5a5; }

    /* ---- Center content ---- */
    .content-area {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden; min-width: 0;
    }

    /* Frame preview + text split */
    .content-split {
      flex: 1; display: flex; overflow: hidden; min-height: 0;
    }

    /* Image panel */
    .image-panel {
      width: 45%; flex-shrink: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 16px;
      border-right: 1px solid rgba(255,255,255,0.04);
      position: relative;
      overflow: hidden;
      background: #06060a;
    }
    .image-panel img {
      max-width: 100%; max-height: 100%;
      border-radius: 8px; object-fit: contain;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
      transition: transform 0.2s;
    }
    .image-panel img:hover { transform: scale(1.02); }
    .image-overlay-info {
      position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
      padding: 6px 14px; background: rgba(0,0,0,0.85);
      border-radius: 16px; font-size: 11px; color: #94a3b8;
      backdrop-filter: blur(8px);
      display: flex; align-items: center; gap: 8px;
    }
    .ocr-conf-indicator {
      width: 8px; height: 8px; border-radius: 50%;
      display: inline-block;
    }

    /* Text panel */
    .text-panel {
      width: 55%; display: flex; flex-direction: column; overflow: hidden;
    }
    .text-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      flex-shrink: 0;
    }
    .text-panel-title { font-size: 12px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
    .text-panel-tabs { display: flex; gap: 2px; background: rgba(255,255,255,0.04); border-radius: 8px; padding: 2px; }
    .text-tab {
      padding: 5px 12px; border-radius: 6px; border: none;
      background: transparent; color: #64748b;
      font-size: 11px; font-weight: 600; cursor: pointer;
      transition: all 0.15s;
    }
    .text-tab:hover { color: #e2e8f0; }
    .text-tab.active { background: rgba(255,255,255,0.1); color: #e2e8f0; }

    /* Extracted text view */
    .text-content {
      flex: 1; overflow-y: auto; padding: 20px;
      font-size: 13px; line-height: 1.8;
      color: #cbd5e1;
    }
    .text-content::-webkit-scrollbar { width: 5px; }
    .text-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

    /* Structured text display */
    .ocr-text-block {
      white-space: pre-wrap; word-break: break-word;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 12.5px;
      line-height: 1.9;
      color: #d1d5db;
      background: rgba(255,255,255,0.02);
      padding: 16px 20px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.04);
    }

    /* Entity highlights in text */
    .entity-highlight {
      padding: 1px 4px; border-radius: 4px;
      cursor: pointer; transition: all 0.15s;
      border-bottom: 2px solid;
      font-weight: 500;
    }
    .entity-highlight:hover { filter: brightness(1.3); }

    .entity-highlight.date { background: rgba(245,158,11,0.12); border-color: #f59e0b; color: #fbbf24; }
    .entity-highlight.currency { background: rgba(34,197,94,0.12); border-color: #22c55e; color: #4ade80; }
    .entity-highlight.email { background: rgba(59,130,246,0.12); border-color: #3b82f6; color: #60a5fa; }
    .entity-highlight.phone { background: rgba(167,139,250,0.12); border-color: #a78bfa; color: #c4b5fd; }
    .entity-highlight.percentage { background: rgba(20,184,166,0.12); border-color: #14b8a6; color: #5eead4; }
    .entity-highlight.person_name { background: rgba(244,114,182,0.12); border-color: #f472b6; color: #f9a8d4; }
    .entity-highlight.organization { background: rgba(251,146,60,0.12); border-color: #fb923c; color: #fdba74; }
    .entity-highlight.address { background: rgba(129,140,248,0.12); border-color: #818cf8; color: #a5b4fc; }
    .entity-highlight.policy_number { background: rgba(232,121,249,0.12); border-color: #e879f9; color: #f0abfc; }
    .entity-highlight.case_number { background: rgba(103,232,249,0.12); border-color: #67e8f9; color: #a5f3fc; }
    .entity-highlight.ssn { background: rgba(239,68,68,0.12); border-color: #ef4444; color: #fca5a5; }
    .entity-highlight.time_value { background: rgba(251,191,36,0.12); border-color: #fbbf24; color: #fde68a; }
    .entity-highlight.state { background: rgba(163,230,53,0.12); border-color: #a3e635; color: #d9f99d; }
    .entity-highlight.zip_code { background: rgba(134,239,172,0.12); border-color: #86efac; color: #bbf7d0; }
    .entity-highlight.claim_number { background: rgba(125,211,252,0.12); border-color: #7dd3fc; color: #bae6fd; }
    .entity-highlight.group_number { background: rgba(192,132,252,0.12); border-color: #c084fc; color: #d8b4fe; }
    .entity-highlight.ein { background: rgba(248,113,113,0.12); border-color: #f87171; color: #fca5a5; }
    .entity-highlight.npi { background: rgba(251,113,133,0.12); border-color: #fb7185; color: #fda4af; }
    .entity-highlight.medical_code { background: rgba(52,211,153,0.12); border-color: #34d399; color: #6ee7b7; }
    .entity-highlight.account_number { background: rgba(253,164,175,0.12); border-color: #fda4af; color: #fecdd3; }
    .entity-highlight.url { background: rgba(148,163,184,0.12); border-color: #94a3b8; color: #cbd5e1; }
    .entity-highlight.id_number { background: rgba(212,212,216,0.12); border-color: #d4d4d8; color: #e4e4e7; }

    .search-highlight { background: rgba(250,204,21,0.3); border-bottom: 2px solid #facc15; color: #fef08a; }

    /* ---- Entities panel ---- */
    .entities-grid {
      display: flex; flex-direction: column; gap: 12px;
      padding: 16px; overflow-y: auto; flex: 1;
    }
    .entities-grid::-webkit-scrollbar { width: 5px; }
    .entities-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

    .entity-group {
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px; overflow: hidden;
    }
    .entity-group-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px;
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .entity-group-count {
      padding: 2px 8px; border-radius: 10px;
      font-size: 10px; font-weight: 600;
      background: rgba(255,255,255,0.06);
    }
    .entity-group-items { padding: 6px 10px 10px; display: flex; flex-wrap: wrap; gap: 6px; }
    .entity-tag {
      padding: 5px 12px; border-radius: 8px;
      font-size: 12px; font-weight: 500;
      cursor: pointer; transition: all 0.15s;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .entity-tag:hover { filter: brightness(1.3); transform: scale(1.03); }

    /* ---- Tables panel ---- */
    .tables-area {
      padding: 16px; overflow-y: auto; flex: 1;
      display: flex; flex-direction: column; gap: 20px;
    }
    .tables-area::-webkit-scrollbar { width: 5px; }
    .tables-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

    .table-card {
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; overflow: hidden;
      background: rgba(255,255,255,0.02);
    }
    .table-card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px;
      background: rgba(255,255,0,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .table-card-title {
      font-size: 12px; font-weight: 700; color: #fbbf24;
      display: flex; align-items: center; gap: 6px;
    }
    .table-card-title svg { width: 14px; height: 14px; }
    .table-card-meta { font-size: 10px; color: #64748b; }

    .extracted-table {
      width: 100%; border-collapse: collapse;
      font-size: 12px; color: #d1d5db;
    }
    .extracted-table th {
      padding: 8px 12px; text-align: left;
      background: rgba(96,165,250,0.08);
      border-bottom: 2px solid rgba(96,165,250,0.2);
      font-weight: 700; color: #93c5fd;
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.3px;
      white-space: nowrap;
    }
    .extracted-table td {
      padding: 7px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      line-height: 1.4;
    }
    .extracted-table tr:hover td {
      background: rgba(255,255,255,0.02);
    }
    .extracted-table tr:last-child td { border-bottom: none; }

    /* ---- Notes panel ---- */
    .notes-area { padding: 16px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .notes-textarea {
      flex: 1; width: 100%; padding: 14px;
      border-radius: 10px; border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03); color: #e2e8f0;
      font-size: 13px; font-family: inherit; line-height: 1.6;
      resize: none; outline: none; transition: border-color 0.2s;
    }
    .notes-textarea:focus { border-color: #3b82f6; }
    .notes-textarea::placeholder { color: #475569; }
    .notes-save-row { display: flex; align-items: center; justify-content: space-between; }
    .notes-saved { font-size: 11px; color: #22c55e; opacity: 0; transition: opacity 0.3s; }
    .notes-saved.show { opacity: 1; }

    /* ---- Processing overlay ---- */
    .processing-overlay {
      display: none; position: fixed; inset: 0; z-index: 500;
      background: rgba(8,8,13,0.92);
      align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
    }
    .processing-overlay.active { display: flex; }
    .processing-spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .processing-text { font-size: 15px; color: #94a3b8; }
    .processing-progress { font-size: 12px; color: #64748b; font-variant-numeric: tabular-nums; }

    /* Search results */
    .search-results-panel {
      display: none;
      padding: 12px 16px;
      background: rgba(250,204,21,0.04);
      border-bottom: 1px solid rgba(250,204,21,0.1);
      max-height: 160px; overflow-y: auto;
    }
    .search-results-panel.active { display: block; }
    .search-result-item {
      padding: 6px 8px; border-radius: 6px;
      cursor: pointer; font-size: 12px; color: #94a3b8;
      transition: background 0.15s; margin-bottom: 2px;
    }
    .search-result-item:hover { background: rgba(255,255,255,0.04); }
    .search-result-item b { color: #fbbf24; font-weight: 600; }
    .search-result-time { font-size: 10px; color: #64748b; margin-right: 8px; font-variant-numeric: tabular-nums; }

    .empty-state { text-align: center; padding: 40px; color: #475569; }
    .empty-state p { font-size: 14px; margin-bottom: 4px; }

    /* Summary stats bar */
    .ocr-summary-bar {
      display: flex; gap: 16px; align-items: center;
      padding: 8px 20px;
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid rgba(255,255,255,0.04);
      flex-shrink: 0;
    }
    .ocr-summary-stat {
      font-size: 11px; color: #94a3b8;
      display: flex; align-items: center; gap: 4px;
    }
    .ocr-summary-stat .num { font-weight: 700; color: #e2e8f0; }
    .ocr-summary-stat .dot { width: 6px; height: 6px; border-radius: 50%; }

    /* ---- Export dropdown ---- */
    .export-wrap { position: relative; display: inline-flex; }
    .export-menu {
      display: none; position: absolute; top: 100%; right: 0; margin-top: 4px;
      background: #1a1a24; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; padding: 4px; min-width: 150px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5); z-index: 200;
    }
    .export-menu.open { display: block; }
    .export-menu-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px; border-radius: 7px; cursor: pointer;
      font-size: 12px; color: #cbd5e1; transition: background 0.12s;
      border: none; background: none; width: 100%; text-align: left;
    }
    .export-menu-item:hover { background: rgba(255,255,255,0.06); }
    .export-menu-item .ext { font-size: 10px; font-weight: 700; color: #64748b;
      background: rgba(255,255,255,0.06); padding: 1px 5px; border-radius: 4px; margin-left: auto; }

    /* ---- Confidence threshold slider ---- */
    .threshold-control {
      padding: 8px 14px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .threshold-row {
      display: flex; align-items: center; gap: 8px;
    }
    .threshold-label {
      font-size: 10px; color: #64748b; white-space: nowrap;
    }
    .threshold-value {
      font-size: 10px; font-weight: 700; color: #94a3b8;
      min-width: 28px; text-align: right;
    }
    .threshold-slider {
      -webkit-appearance: none; appearance: none;
      flex: 1; height: 14px; border-radius: 2px;
      background: transparent; outline: none;
      cursor: pointer;
    }
    .threshold-slider::-webkit-slider-runnable-track {
      height: 4px; border-radius: 2px;
      background: rgba(255,255,255,0.08);
    }
    .threshold-slider::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 14px; height: 14px; border-radius: 50%;
      background: #60a5fa; cursor: pointer;
      border: 2px solid #0a0a10;
      margin-top: -5px;
    }
    .threshold-showing {
      font-size: 9px; color: #475569; margin-top: 4px;
    }

    /* ---- Frame selection system ---- */
    .selection-toolbar {
      padding: 6px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      display: flex; align-items: center; gap: 4px; flex-wrap: wrap;
    }
    .sel-btn {
      padding: 4px 8px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03); color: #94a3b8;
      font-size: 10px; font-weight: 600; cursor: pointer;
      transition: all 0.12s; white-space: nowrap;
    }
    .sel-btn:hover { background: rgba(255,255,255,0.06); color: #e2e8f0; }
    .sel-btn.active { background: rgba(96,165,250,0.15); border-color: rgba(96,165,250,0.3); color: #60a5fa; }
    .sel-btn.danger { color: #f87171; border-color: rgba(248,113,113,0.2); }
    .sel-btn.danger:hover { background: rgba(248,113,113,0.1); }
    .sel-count {
      font-size: 10px; color: #64748b; margin-left: auto; white-space: nowrap;
    }
    .sel-count b { color: #60a5fa; font-weight: 700; }

    /* Metric dropdown */
    .metric-wrap { position: relative; }
    .metric-menu {
      display: none; position: absolute; top: 100%; left: 0; margin-top: 4px;
      background: #1a1a24; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; padding: 4px; min-width: 200px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5); z-index: 200;
    }
    .metric-menu.open { display: block; }
    .metric-menu-item {
      display: flex; flex-direction: column; gap: 1px;
      padding: 7px 10px; border-radius: 7px; cursor: pointer;
      font-size: 11px; color: #cbd5e1; transition: background 0.12s;
      border: none; background: none; width: 100%; text-align: left;
    }
    .metric-menu-item:hover { background: rgba(255,255,255,0.06); }
    .metric-menu-item .metric-desc { font-size: 9px; color: #64748b; }

    /* Selection checkbox on frame cards */
    .fs-card .fs-check {
      position: absolute; top: 4px; right: 4px;
      width: 16px; height: 16px; border-radius: 4px;
      border: 1.5px solid rgba(255,255,255,0.15);
      background: rgba(0,0,0,0.3);
      display: none; align-items: center; justify-content: center;
      cursor: pointer; z-index: 5; transition: all 0.12s;
      font-size: 10px; color: transparent; line-height: 1;
    }
    .selection-mode .fs-card .fs-check { display: flex; }
    .fs-card.selected .fs-check {
      background: #2563eb; border-color: #3b82f6; color: #fff;
    }
    .fs-card.selected { background: rgba(37,99,235,0.08); border-color: rgba(37,99,235,0.2); }

    /* ---- Global NER panel ---- */
    .global-ner-panel {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .global-ner-panel::-webkit-scrollbar { width: 5px; }
    .global-ner-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
    .ner-search-wrap {
      position: relative; flex-shrink: 0;
    }
    .ner-search {
      width: 100%; padding: 8px 12px 8px 32px;
      border-radius: 8px; border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03); color: #e2e8f0;
      font-size: 12px; outline: none;
    }
    .ner-search:focus { border-color: #3b82f6; }
    .ner-search::placeholder { color: #475569; }
    .ner-search-icon {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      color: #475569; pointer-events: none;
    }
    .ner-summary-row {
      display: flex; gap: 8px; flex-wrap: wrap;
    }
    .ner-summary-chip {
      padding: 3px 8px; border-radius: 6px; font-size: 10px; font-weight: 600;
      background: rgba(255,255,255,0.04); color: #94a3b8;
    }
    .ner-summary-chip b { font-weight: 700; }
    .ner-entity-row {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 10px; border-radius: 8px;
      transition: background 0.12s; cursor: pointer;
    }
    .ner-entity-row:hover { background: rgba(255,255,255,0.03); }
    .ner-entity-text { font-size: 13px; font-weight: 500; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ner-entity-freq {
      font-size: 10px; font-weight: 700; color: #64748b;
      padding: 1px 6px; border-radius: 4px; background: rgba(255,255,255,0.04);
      white-space: nowrap;
    }
    .ner-entity-frames {
      display: none; padding: 4px 10px 8px 28px;
      font-size: 11px; color: #64748b;
    }
    .ner-entity-frames.open { display: block; }
    .ner-frame-link {
      color: #60a5fa; cursor: pointer; margin-right: 8px;
      text-decoration: underline; text-decoration-color: rgba(96,165,250,0.3);
    }
    .ner-frame-link:hover { text-decoration-color: #60a5fa; }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-left">
      <a href="/" class="brand"><img src="/static/img/logo-light.svg" alt="" width="20" height="20" style="vertical-align:-4px;margin-right:5px">PolicyCapture</a>
      <span class="topbar-sep">/</span>
      <a href="/" class="topbar-link">Dashboard</a>
      <span class="topbar-sep">/</span>
      <span class="topbar-title" id="job-title">OCR & Entity Review</span>
    </div>
    <div class="topbar-right">
      <span class="stat" id="stat-frames">Frames: <b>-</b></span>
      <span class="stat" id="stat-entities">Entities: <b>-</b></span>
      <span class="stat" id="stat-tables">Tables: <b>-</b></span>
      <button class="btn btn-green" id="btn-run-ocr">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
        Run OCR & Extract
      </button>
      <button class="btn btn-ghost" id="btn-rerun-ocr" title="Force re-run OCR on all frames">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/></svg>
        Re-run OCR
      </button>
      <button class="btn btn-ghost" id="btn-back-frames">Back to Frames</button>
      <button class="btn btn-green" id="btn-generate-report" style="background:#1e40af">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        View Report
      </button>
      <div class="export-wrap">
        <button class="btn btn-blue" id="btn-export">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
          Export
        </button>
        <div class="export-menu" id="export-menu">
          <button class="export-menu-item" data-format="json">JSON data <span class="ext">.json</span></button>
          <button class="export-menu-item" data-format="txt">Plain text <span class="ext">.txt</span></button>
          <button class="export-menu-item" data-format="docx">Word document <span class="ext">.docx</span></button>
        </div>
      </div>
    </div>
  </div>

  <!-- Search bar -->
  <div class="search-bar">
    <div class="search-input-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-input" id="search-input" type="text" placeholder="Search extracted text, entities, annotations... (Cmd+F)">
    </div>
    <span class="search-results-count" id="search-count"></span>
    <div class="entity-filters" id="entity-filters"></div>
  </div>

  <!-- Search results -->
  <div class="search-results-panel" id="search-results"></div>

  <div class="main-area">
    <!-- Left: frame thumbnails -->
    <div class="frame-strip">
      <div class="frame-strip-header">
        <span>Processed Frames</span>
        <span class="frame-count" id="frame-count">0</span>
      </div>
      <div class="selection-toolbar" id="selection-toolbar">
        <button class="sel-btn" id="sel-all" title="Select all visible frames">All</button>
        <button class="sel-btn" id="sel-filter" title="Select by confidence threshold">By Filter</button>
        <div class="metric-wrap">
          <button class="sel-btn" id="sel-metric" title="Select by computed metric">By Metric</button>
          <div class="metric-menu" id="metric-menu">
            <button class="metric-menu-item" data-metric="density">
              Info Density
              <span class="metric-desc">Text length x entity count x confidence</span>
            </button>
            <button class="metric-menu-item" data-metric="data-rich">
              Data-Rich
              <span class="metric-desc">Frames with tables, forms, or key-value pairs</span>
            </button>
            <button class="metric-menu-item" data-metric="entity-diverse">
              Entity Diversity
              <span class="metric-desc">Most unique entity types per frame</span>
            </button>
            <button class="metric-menu-item" data-metric="unique-content">
              Unique Content
              <span class="metric-desc">Least textual overlap with other frames</span>
            </button>
          </div>
        </div>
        <button class="sel-btn danger" id="sel-clear" style="display:none" title="Clear selection">Clear</button>
        <span class="sel-count" id="sel-count"></span>
      </div>
      <div class="threshold-control" id="threshold-control" style="display:none">
        <div class="threshold-row">
          <span class="threshold-label">Min conf.</span>
          <input type="range" class="threshold-slider" id="threshold-slider" min="0" max="100" value="0" step="5">
          <span class="threshold-value" id="threshold-value">0%</span>
        </div>
        <div class="threshold-showing" id="threshold-showing"></div>
      </div>
      <div class="frame-strip-list" id="frame-list"></div>
    </div>

    <!-- Center: content -->
    <div class="content-area">
      <div class="content-split">
        <!-- Image -->
        <div class="image-panel">
          <img id="content-img" src="" alt="" style="display:none">
          <div class="image-overlay-info" id="image-info" style="display:none">
            <span class="ocr-conf-indicator" id="ocr-conf-dot"></span>
            <span id="image-info-text"></span>
          </div>
          <div class="empty-state" id="content-empty">
            <p>Select a frame to view OCR results</p>
            <p style="font-size:11px;color:#475569">Click "Run OCR & Extract" to process all frames</p>
          </div>
        </div>

        <!-- Text / Entities / Tables / Notes -->
        <div class="text-panel">
          <div class="text-panel-header">
            <span class="text-panel-title" id="text-panel-title">Extracted Text</span>
            <div class="text-panel-tabs">
              <button class="text-tab active" data-tab="text">Text</button>
              <button class="text-tab" data-tab="entities">Entities</button>
              <button class="text-tab" data-tab="tables">Data</button>
              <button class="text-tab" data-tab="global-ner">Global NER</button>
              <button class="text-tab" data-tab="notes">Notes</button>
            </div>
          </div>
          <div class="text-content" id="text-view" style="display:block">
            <div class="empty-state"><p>No text extracted yet</p></div>
          </div>
          <div class="entities-grid" id="entities-view" style="display:none"></div>
          <div class="tables-area" id="tables-view" style="display:none"></div>
          <div class="global-ner-panel" id="global-ner-view" style="display:none"></div>
          <div class="notes-area" id="notes-view" style="display:none">
            <textarea class="notes-textarea" id="notes-textarea" placeholder="Add your annotations and notes here..."></textarea>
            <div class="notes-save-row">
              <span class="notes-saved" id="notes-saved">Saved</span>
              <button class="btn btn-blue" id="btn-save-notes">Save Notes</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Processing overlay -->
  <div class="processing-overlay" id="processing-overlay">
    <div class="processing-spinner"></div>
    <div class="processing-text">Running OCR & Entity Extraction...</div>
    <div class="processing-progress" id="processing-progress">Preparing...</div>
  </div>

  <script src="/static/js/ocr_review.js"></script>
  <script>
    const JOB_ID = "{{ job_id }}";
    document.getElementById('btn-generate-report').addEventListener('click', async () => {
      const btn = document.getElementById('btn-generate-report');
      btn.disabled = true;
      btn.textContent = 'Generating...';
      try {
        const res = await fetch(`/api/jobs/${JOB_ID}/report`, { method: 'POST' });
        if (!res.ok) throw new Error(await res.text());
        window.open(`/api/jobs/${JOB_ID}/report/pdf`, '_blank');
      } catch (e) {
        alert('Report generation failed: ' + e.message);
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> View Report';
      }
    });
  </script>
</body>
</html>
