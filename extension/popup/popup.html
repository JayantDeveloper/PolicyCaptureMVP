<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PolicyCapture</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      background: #0f172a; color: #e2e8f0; width: 240px;
    }
    .popup { padding: 16px; text-align: center; }
    .brand { font-size: 15px; font-weight: 600; margin-bottom: 14px; color: #fff; }
    .accent { color: #60a5fa; }
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 11px; border: none; border-radius: 10px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: background 0.15s, transform 0.1s; margin-bottom: 8px;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: #dc2626; color: #fff; }
    .btn-primary:hover { background: #b91c1c; }
    .btn-ghost { background: transparent; color: #60a5fa; font-size: 12px; font-weight: 500; }
    .btn-ghost:hover { background: rgba(96,165,250,0.1); }
    .circle { width: 10px; height: 10px; border-radius: 50%; background: #fff; }
  </style>
</head>
<body>
  <div class="popup">
    <div class="brand">Policy<span class="accent">Capture</span></div>
    <button class="btn btn-primary" id="btn-open">
      <span class="circle"></span> Open Recorder
    </button>
    <button class="btn btn-ghost" id="btn-dash">Open Dashboard</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
